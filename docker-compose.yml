x-node: &node
  image: postgres:18.4
  environment:
    POSTGRES_PASSWORD: postgres
    # picked up by pg_basebackup and by the standby's walreceiver
    PGPASSWORD: postgres
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 2s
    timeout: 2s
    retries: 30

# No command-line -c flags anywhere: the cluster GUCs live in the datadir via
# ALTER SYSTEM (init-primary.sh) so that standbys inherit them with the
# basebackup and tools that restart a node from its datadir see them too.
services:
  publisher:
    <<: *node
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./docker/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh:ro

  publisher-standby:
    <<: *node
    user: postgres
    entrypoint: ["bash", "/docker/standby-entrypoint.sh", "publisher"]
    command: [postgres]
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - ./docker:/docker:ro
    depends_on:
      publisher:
        condition: service_healthy

  subscriber:
    <<: *node
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - ./docker/init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh:ro

  subscriber-standby:
    <<: *node
    user: postgres
    entrypoint: ["bash", "/docker/standby-entrypoint.sh", "subscriber"]
    command: [postgres]
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - ./docker:/docker:ro
    depends_on:
      subscriber:
        condition: service_healthy
